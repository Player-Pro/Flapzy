<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flapzy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --sky: #87CEEB;
    --sky-dark: #5ba3c9;
    --ground: #8B6914;
    --ground-top: #5a9e2f;
    --accent: #FFD700;
    --danger: #ff5555;
  }

  body {
    background: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100dvh;
    overflow: hidden;
    font-family: 'Nunito', sans-serif;
    touch-action: none;
  }

  #gameContainer {
    position: relative;
    overflow: hidden;
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
  }

  canvas { display: block; }

  /* UI overlay */
  #ui {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #scoreDisplay {
    margin-top: 16px;
    font-family: 'Fredoka One', cursive;
    font-size: clamp(32px, 7vw, 52px);
    color: #fff;
    text-shadow: 0 3px 0 rgba(0,0,0,0.3);
    display: none;
  }

  /* Screens */
  .screen {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: rgba(0,0,0,0.45);
    pointer-events: all;
  }

  .screen.hidden { display: none; }

  .screenTitle {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(36px, 8vw, 64px);
    color: #fff;
    text-shadow: 0 4px 0 rgba(0,0,0,0.3);
    letter-spacing: 2px;
  }

  .screenSub {
    font-size: clamp(13px, 3vw, 18px);
    color: rgba(255,255,255,0.6);
    letter-spacing: 1px;
  }

  .bigBtn {
    pointer-events: all;
    background: var(--accent);
    color: #333;
    border: none;
    padding: 14px 44px;
    font-family: 'Fredoka One', cursive;
    font-size: clamp(16px, 4vw, 22px);
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 50px;
    box-shadow: 0 5px 0 #b8960a;
    transition: transform 0.1s, box-shadow 0.1s;
    margin-top: 8px;
  }

  .bigBtn:active { transform: translateY(3px); box-shadow: 0 2px 0 #b8960a; }

  .scoreCard {
    background: rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 12px 32px;
    text-align: center;
    backdrop-filter: blur(4px);
  }

  .scoreCard .label {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .scoreCard .val {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(28px, 6vw, 42px);
    color: #fff;
  }

  .scoreRow {
    display: flex;
    gap: 16px;
  }
</style>
</head>
<body>

<div id="gameContainer">
  <canvas id="c"></canvas>
  <div id="ui">
    <div id="scoreDisplay">0</div>

    <!-- Start screen -->
    <div class="screen" id="startScreen">
      <div class="screenTitle">🐦 Flapzy</div>
      <div class="screenSub">tap or press space to flap</div>
      <button class="bigBtn" id="startBtn">Play</button>
    </div>

    <!-- Game over screen -->
    <div class="screen hidden" id="overScreen">
      <div class="screenTitle">Oh no!</div>
      <div class="scoreRow">
        <div class="scoreCard">
          <div class="label">Score</div>
          <div class="val" id="finalScore">0</div>
        </div>
        <div class="scoreCard">
          <div class="label">Best</div>
          <div class="val" id="bestScore">0</div>
        </div>
      </div>
      <button class="bigBtn" id="retryBtn">Try Again</button>
      <button class="bigBtn" style="background:#fff;color:#333;box-shadow:0 5px 0 #aaa;margin-top:0" id="menuBtn">Menu</button>
    </div>
  </div>
</div>

<script>
const isMobile = navigator.maxTouchPoints > 1 || /Mobi|Android/i.test(navigator.userAgent);

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const container = document.getElementById('gameContainer');

// Responsive size
function getSize() {
  if (isMobile) {
    const w = Math.min(window.innerWidth, 420);
    const h = Math.min(window.innerHeight, 680);
    return { W: w, H: h };
  }
  return { W: 420, H: 640 };
}

let { W, H } = getSize();
canvas.width = W; canvas.height = H;
container.style.width = W + 'px';
container.style.height = H + 'px';

// Game state
let bird, platforms, score, best, gameState, animFrame;
best = 0;
gameState = 'start'; // start | playing | dead

// Constants
const GRAVITY = 0.45;
const FLAP = -9;
const PLATFORM_SPEED = 2.8;
const PLATFORM_GAP = H * 0.28;
const PLATFORM_W = 80;
const PLATFORM_H = 18;
const BIRD_R = 18;
const GROUND_H = 60;
const SPAWN_INTERVAL = 1600; // ms

// Cloud parallax
let clouds = [
  { x: W * 0.2, y: H * 0.12, s: 1.0 },
  { x: W * 0.6, y: H * 0.22, s: 0.7 },
  { x: W * 0.85, y: H * 0.08, s: 0.85 },
];

let lastSpawn = 0;
let bgOffset = 0;

function initBird() {
  return {
    x: W * 0.28,
    y: H * 0.45,
    vy: 0,
    angle: 0,
    flapAnim: 0, // wing flap
    dead: false,
    trail: []
  };
}

function spawnPlatformPair() {
  // Random gap center between 25% and 75% of playable height
  const playH = H - GROUND_H;
  const minCenter = playH * 0.25;
  const maxCenter = playH * 0.75;
  const center = minCenter + Math.random() * (maxCenter - minCenter);

  return [
    // Top platform
    { x: W + PLATFORM_W, y: center - PLATFORM_GAP / 2 - PLATFORM_H, top: true },
    // Bottom platform
    { x: W + PLATFORM_W, y: center + PLATFORM_GAP / 2, top: false },
  ];
}

function startGame() {
  bird = initBird();
  platforms = [];
  score = 0;
  lastSpawn = performance.now();
  gameState = 'playing';
  document.getElementById('scoreDisplay').style.display = 'block';
  document.getElementById('scoreDisplay').textContent = '0';
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('overScreen').classList.add('hidden');
}

function flap() {
  if (gameState === 'playing' && !bird.dead) {
    bird.vy = FLAP;
    bird.flapAnim = 1;
  }
}

// Input
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.key === ' ') {
    e.preventDefault();
    if (gameState === 'playing') flap();
  }
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (gameState === 'playing') flap();
}, { passive: false });

canvas.addEventListener('mousedown', () => {
  if (gameState === 'playing') flap();
});

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('retryBtn').addEventListener('click', startGame);
document.getElementById('menuBtn').addEventListener('click', () => {
  gameState = 'start';
  document.getElementById('overScreen').classList.add('hidden');
  document.getElementById('startScreen').classList.remove('hidden');
  document.getElementById('scoreDisplay').style.display = 'none';
});

function checkCollision() {
  const bx = bird.x, by = bird.y, br = BIRD_R - 4;

  // Ground
  if (by + br >= H - GROUND_H) return true;
  // Ceiling
  if (by - br <= 0) return true;

  // Platforms
  for (const p of platforms) {
    // Top platform: extends from top of screen down to p.y + PLATFORM_H
    if (p.top) {
      if (bx + br > p.x && bx - br < p.x + PLATFORM_W &&
          by - br < p.y + PLATFORM_H && by + br > 0) {
        // Only collide with bottom face of top platform
        if (by + br > p.y && by - br < p.y + PLATFORM_H) return true;
        if (by - br < p.y + PLATFORM_H && bx + br > p.x && bx - br < p.x + PLATFORM_W) return true;
      }
    } else {
      // Bottom platform: from p.y to bottom of play area
      if (bx + br > p.x && bx - br < p.x + PLATFORM_W &&
          by + br > p.y && by - br < p.y + PLATFORM_H) return true;
    }
  }
  return false;
}

function update(now) {
  if (gameState !== 'playing' || bird.dead) return;

  // Spawn platforms
  if (now - lastSpawn > SPAWN_INTERVAL) {
    platforms.push(...spawnPlatformPair());
    lastSpawn = now;
  }

  // Bird physics
  bird.vy += GRAVITY;
  bird.y += bird.vy;
  bird.angle = Math.min(Math.PI / 4, Math.max(-Math.PI / 3, bird.vy * 0.06));
  bird.flapAnim = Math.max(0, bird.flapAnim - 0.12);

  // Trail
  bird.trail.unshift({ x: bird.x, y: bird.y });
  if (bird.trail.length > 8) bird.trail.pop();

  // Move platforms
  for (const p of platforms) p.x -= PLATFORM_SPEED;

  // Score — count when platform pair passes bird
  for (const p of platforms) {
    if (!p.scored && !p.top && p.x + PLATFORM_W < bird.x) {
      p.scored = true;
      score++;
      document.getElementById('scoreDisplay').textContent = score;
    }
  }

  // Remove offscreen
  platforms = platforms.filter(p => p.x + PLATFORM_W > -10);

  // Clouds
  bgOffset += 0.3;
  for (const c of clouds) {
    c.x -= 0.4 * c.s;
    if (c.x < -120) c.x = W + 60;
  }

  // Collision
  if (checkCollision()) {
    bird.dead = true;
    setTimeout(showGameOver, 600);
  }
}

function showGameOver() {
  gameState = 'dead';
  if (score > best) best = score;
  document.getElementById('finalScore').textContent = score;
  document.getElementById('bestScore').textContent = best;
  document.getElementById('overScreen').classList.remove('hidden');
}

// Drawing helpers
function drawCloud(x, y, scale) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.beginPath();
  ctx.arc(0, 0, 28, 0, Math.PI * 2);
  ctx.arc(30, -8, 22, 0, Math.PI * 2);
  ctx.arc(58, 0, 26, 0, Math.PI * 2);
  ctx.arc(30, 10, 20, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawBird(b) {
  ctx.save();
  ctx.translate(b.x, b.y);
  ctx.rotate(b.angle);

  // Trail
  for (let i = 0; i < b.trail.length; i++) {
    const alpha = (1 - i / b.trail.length) * 0.15;
    ctx.beginPath();
    ctx.arc(b.trail[i].x - b.x, b.trail[i].y - b.y, BIRD_R * (1 - i * 0.08), 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,220,50,${alpha})`;
    ctx.fill();
  }

  // Body
  ctx.beginPath();
  ctx.ellipse(0, 0, BIRD_R, BIRD_R * 0.82, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#FFD700';
  ctx.fill();
  ctx.strokeStyle = '#e6a800';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Wing
  const wingY = 4 + Math.sin(b.flapAnim * Math.PI) * 10;
  ctx.beginPath();
  ctx.ellipse(-4, wingY, 10, 6, -0.3, 0, Math.PI * 2);
  ctx.fillStyle = '#FFA500';
  ctx.fill();

  // Eye
  ctx.beginPath();
  ctx.arc(8, -4, 5, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(9, -4, 2.5, 0, Math.PI * 2);
  ctx.fillStyle = '#222';
  ctx.fill();

  // Beak
  ctx.beginPath();
  ctx.moveTo(14, 0);
  ctx.lineTo(22, -3);
  ctx.lineTo(22, 3);
  ctx.closePath();
  ctx.fillStyle = '#FF8C00';
  ctx.fill();

  ctx.restore();
}

function drawPlatform(p) {
  const x = p.x, y = p.y;
  const isTop = p.top;

  // Platform body
  const grad = ctx.createLinearGradient(x, y, x, y + PLATFORM_H);
  grad.addColorStop(0, isTop ? '#6ec6f5' : '#5cb85c');
  grad.addColorStop(1, isTop ? '#3a9fd4' : '#3d8b3d');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(x, y, PLATFORM_W, PLATFORM_H, isTop ? [0, 0, 6, 6] : [6, 6, 0, 0]);
  ctx.fill();

  // Shine
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.beginPath();
  ctx.roundRect(x + 4, y + 3, PLATFORM_W - 8, 4, 2);
  ctx.fill();

  // Spikes on top platform (danger indicator)
  if (isTop) {
    ctx.fillStyle = '#3a9fd4';
    for (let i = 0; i < 5; i++) {
      const sx = x + 8 + i * 14;
      ctx.beginPath();
      ctx.moveTo(sx, y);
      ctx.lineTo(sx + 5, y - 8);
      ctx.lineTo(sx + 10, y);
      ctx.closePath();
      ctx.fill();
    }
  }

  // Grass on bottom platform
  if (!isTop) {
    ctx.fillStyle = '#7ec850';
    for (let i = 0; i < 5; i++) {
      const gx = x + 8 + i * 14;
      ctx.beginPath();
      ctx.moveTo(gx, y);
      ctx.lineTo(gx + 5, y - 8);
      ctx.lineTo(gx + 10, y);
      ctx.closePath();
      ctx.fill();
    }
  }
}

function draw() {
  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H - GROUND_H);
  skyGrad.addColorStop(0, '#5ba3c9');
  skyGrad.addColorStop(1, '#a8d8ea');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H - GROUND_H);

  // Clouds
  for (const c of clouds) drawCloud(c.x, c.y, c.s);

  // Platforms
  for (const p of platforms) drawPlatform(p);

  // Bird
  if (bird) drawBird(bird);

  // Ground
  ctx.fillStyle = '#8B6914';
  ctx.fillRect(0, H - GROUND_H, W, GROUND_H);
  ctx.fillStyle = '#5a9e2f';
  ctx.fillRect(0, H - GROUND_H, W, 14);

  // Ground grass tufts
  ctx.fillStyle = '#6abe3a';
  for (let i = 0; i < W; i += 28) {
    ctx.beginPath();
    ctx.moveTo(i, H - GROUND_H);
    ctx.lineTo(i + 6, H - GROUND_H - 8);
    ctx.lineTo(i + 12, H - GROUND_H);
    ctx.closePath();
    ctx.fill();
  }
}

// Game loop
function loop(now) {
  update(now);
  draw();
  animFrame = requestAnimationFrame(loop);
}

// Init bird for start screen preview
bird = initBird();
bird.vy = 0;
animFrame = requestAnimationFrame(loop);
</script>
</body>
</html>
