function playFlap() { try { flapAudio.currentTime = 0; flapAudio.play(); } catch(e){} }

// --- CONSTANTS ---
const GRAVITY    = 0.5;
const FLAP_FORCE = -10;
const PLAT_SPEED = 2.5;
const PLAT_W     = 90;
const PLAT_H     = 18;
const GAP        = H * 0.28;
const GROUND_H   = 55;
const BIRD_SIZE  = 18;
const PLAY_H     = H - GROUND_H;

let state = 'start';
let score = 0;
let best  = 0;
let bird  = {};
let pairs = [];
let spawnTimer = 0;
let clouds = [];
let hitPlayed = false;

for (let i = 0; i < 4; i++) {
  clouds.push({ x: Math.random() * W, y: 30 + Math.random() * (PLAY_H * 0.4), spd: 0.3 + Math.random() * 0.3 });
}

function resetBird() {
  bird = { x: W * 0.25, y: H * 0.45, vy: 0, angle: 0, wing: 0 };
}

function spawnPair() {
  const minCenter = PLAY_H * 0.28;
  const maxCenter = PLAY_H * 0.72;
  const gapCenter = minCenter + Math.random() * (maxCenter - minCenter);
  pairs.push({
    x:      W + PLAT_W,
    gapTop: gapCenter - GAP / 2,
    gapBot: gapCenter + GAP / 2,
    passed: false
  });
}

function startGame() {
  resetBird();
  pairs = [];
  score = 0;
  spawnTimer = 0;
  hitPlayed = false;
  spawnPair();
  state = 'play';
}

function doFlap() {
  if (state === 'play') {
    bird.vy = FLAP_FORCE;
    bird.wing = 1;
    playFlap();
  } else if (state === 'start' || state === 'dead') {
    startGame();
  }
}

document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); doFlap(); } });
canvas.addEventListener('touchstart', e => { e.preventDefault(); doFlap(); }, { passive: false });
canvas.addEventListener('mousedown', doFlap);

// --- UPDATE ---
function update() {
  for (const c of clouds) {
    c.x -= c.spd;
    if (c.x < -80) c.x = W + 40;
  }

  if (state !== 'play') return;

  bird.vy += GRAVITY;
  bird.y  += bird.vy;
  bird.angle = Math.max(-0.4, Math.min(0.5, bird.vy * 0.055));
  bird.wing  = Math.max(0, bird.wing - 0.1);

  spawnTimer++;
  if (spawnTimer > 105) { spawnPair(); spawnTimer = 0; }

  for (const p of pairs) {
    p.x -= PLAT_SPEED;
    if (!p.passed && p.x + PLAT_W < bird.x) {
      p.passed = true;
      score++;
      if (score > best) best = score;
      playDing();
    }
  }
  pairs = pairs.filter(p => p.x + PLAT_W > -10);

  if (bird.y + BIRD_SIZE >= PLAY_H || bird.y - BIRD_SIZE <= 0) {
    if (!hitPlayed) { playHit(); hitPlayed = true; }
    state = 'dead'; return;
  }

  const br = BIRD_SIZE - 3;
  for (const p of pairs) {
    const bx = bird.x, by = bird.y;
    if (bx + br > p.x && bx - br < p.x + PLAT_W) {
      if (by - br < p.gapTop) { if (!hitPlayed) { playHit(); hitPlayed = true; } state = 'dead'; return; }
      if (by + br > p.gapBot) { if (!hitPlayed) { playHit(); hitPlayed = true; } state = 'dead'; return; }
    }
  }
}

// --- DRAW ---
function drawCloud(x, y) {
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  ctx.beginPath();
  ctx.arc(x, y, 22, 0, Math.PI*2); ctx.arc(x+24, y-6, 17, 0, Math.PI*2);
  ctx.arc(x+46, y, 20, 0, Math.PI*2); ctx.arc(x+24, y+8, 16, 0, Math.PI*2);
  ctx.fill();
}

function drawBird() {
  const { x, y, angle, wing } = bird;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.beginPath(); ctx.ellipse(0, 0, BIRD_SIZE, BIRD_SIZE*0.8, 0, 0, Math.PI*2);
  ctx.fillStyle = '#FFD700'; ctx.fill();
  ctx.strokeStyle = '#cc9900'; ctx.lineWidth = 2; ctx.stroke();
  const wFlap = Math.sin(wing * Math.PI) * 10;
  ctx.beginPath(); ctx.ellipse(-2, 4+wFlap, 9, 5, -0.2, 0, Math.PI*2);
  ctx.fillStyle = '#FFA500'; ctx.fill();
  ctx.beginPath(); ctx.arc(7, -5, 5, 0, Math.PI*2); ctx.fillStyle = '#fff'; ctx.fill();
  ctx.beginPath(); ctx.arc(8, -5, 2.5, 0, Math.PI*2); ctx.fillStyle = '#111'; ctx.fill();
  ctx.beginPath(); ctx.moveTo(14,0); ctx.lineTo(23,-3); ctx.lineTo(23,4); ctx.closePath();
  ctx.fillStyle = '#FF7700'; ctx.fill();
  ctx.restore();
}

function drawPair(p) {
  const x = p.x;
  const topH = p.gapTop;
  if (topH > 0) {
    const tg = ctx.createLinearGradient(x, 0, x, topH);
    tg.addColorStop(0, '#5aaee8'); tg.addColorStop(1, '#339af0');
    ctx.fillStyle = tg; ctx.fillRect(x, 0, PLAT_W, topH);
    ctx.fillStyle = '#228be6';
    ctx.beginPath(); ctx.roundRect(x, topH-PLAT_H, PLAT_W, PLAT_H, [0,0,8,8]); ctx.fill();
    ctx.fillStyle = '#1971c2';
    for (let i = 0; i < 4; i++) {
      const sx = x+8+i*19;
      ctx.beginPath(); ctx.moveTo(sx, topH); ctx.lineTo(sx+8, topH+11); ctx.lineTo(sx+16, topH); ctx.fill();
    }
    ctx.fillStyle = 'rgba(255,255,255,0.18)'; ctx.fillRect(x+4, 4, PLAT_W-8, topH-8);
  }
  const botY = p.gapBot;
  const botH = PLAY_H - botY;
  if (botH > 0) {
    const bg = ctx.createLinearGradient(x, botY, x, PLAY_H);
    bg.addColorStop(0, '#69db7c'); bg.addColorStop(1, '#2f9e44');
    ctx.fillStyle = bg; ctx.fillRect(x, botY, PLAT_W, botH);
    ctx.fillStyle = '#37b24d';
    ctx.beginPath(); ctx.roundRect(x, botY, PLAT_W, PLAT_H, [8,8,0,0]); ctx.fill();
    ctx.fillStyle = '#8ce99a';
    for (let i = 0; i < 4; i++) {
      const gx = x+8+i*19;
      ctx.beginPath(); ctx.moveTo(gx, botY); ctx.lineTo(gx+5, botY-11); ctx.lineTo(gx+10, botY); ctx.fill();
    }
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fillRect(x+4, botY+PLAT_H+4, PLAT_W-8, Math.max(0, botH-PLAT_H-8));
  }
}

function drawGround() {
  ctx.fillStyle = '#6B4C11'; ctx.fillRect(0, PLAY_H, W, GROUND_H);
  ctx.fillStyle = '#40a020'; ctx.fillRect(0, PLAY_H, W, 14);
  ctx.fillStyle = '#55c030';
  for (let i = 0; i < W; i += 22) {
    ctx.beginPath(); ctx.moveTo(i, PLAY_H); ctx.lineTo(i+5, PLAY_H-9); ctx.lineTo(i+10, PLAY_H); ctx.fill();
  }
}

function rr(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function drawUI() {
  ctx.textAlign = 'center';
  if (state === 'play') {
    ctx.fillStyle = '#fff'; ctx.shadowColor = 'rgba(0,0,0,0.4)'; ctx.shadowBlur = 6;
    ctx.font = `bold ${Math.round(W*0.12)}px 'Fredoka One', cursive`;
    ctx.fillText(score, W/2, 70); ctx.shadowBlur = 0;
  }
  if (state === 'start') {
    ctx.fillStyle = 'rgba(0,0,0,0.5)'; rr(W/2-145, H/2-115, 290, 210, 18); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = `${Math.round(W*0.12)}px 'Fredoka One', cursive`;
    ctx.fillText('🐦 Flapzy', W/2, H/2-52);
    ctx.font = `${Math.round(W*0.048)}px 'Fredoka One', cursive`;
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.fillText(isMobile ? 'tap anywhere to flap' : 'space or click to flap', W/2, H/2-4);
    ctx.fillStyle = '#FFD700'; rr(W/2-72, H/2+22, 144, 50, 25); ctx.fill();
    ctx.fillStyle = '#333';
    ctx.font = `${Math.round(W*0.065)}px 'Fredoka One', cursive`;
    ctx.fillText('PLAY', W/2, H/2+56);
  }
  if (state === 'dead') {
    ctx.fillStyle = 'rgba(0,0,0,0.6)'; rr(W/2-155, H/2-125, 310, 240, 18); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = `${Math.round(W*0.09)}px 'Fredoka One', cursive`;
    ctx.fillText('Oh no! 💥', W/2, H/2-65);
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    rr(W/2-135, H/2-38, 115, 72, 10); ctx.fill();
    rr(W/2+20,  H/2-38, 115, 72, 10); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.font = `${Math.round(W*0.034)}px 'Fredoka One', cursive`;
    ctx.fillText('SCORE', W/2-77, H/2-16); ctx.fillText('BEST', W/2+77, H/2-16);
    ctx.fillStyle = '#fff';
    ctx.font = `${Math.round(W*0.09)}px 'Fredoka One', cursive`;
    ctx.fillText(score, W/2-77, H/2+28); ctx.fillText(best, W/2+77, H/2+28);
    ctx.fillStyle = '#FFD700'; rr(W/2-82, H/2+58, 164, 52, 26); ctx.fill();
    ctx.fillStyle = '#333';
    ctx.font = `${Math.round(W*0.055)}px 'Fredoka One', cursive`;
    ctx.fillText('TRY AGAIN', W/2, H/2+92);
  }
}

function draw() {
  const sky = ctx.createLinearGradient(0, 0, 0, PLAY_H);
  sky.addColorStop(0, '#4a90d9'); sky.addColorStop(1, '#a8d8ea');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, PLAY_H);
  for (const c of clouds) drawCloud(c.x, c.y);
  for (const p of pairs)  drawPair(p);
  if (state === 'start') {
    bird.y = H*0.45 + Math.sin(Date.now()*0.003)*8;
    bird.angle = Math.sin(Date.now()*0.003)*0.1;
  }
  drawBird();
  drawGround();
  drawUI();
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
resetBird();
loop();
</script>
